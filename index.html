<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mars Terrain Guild - Board Game Prototype</title>
    <style>
      :root {
        --bg: #0f1220;
        --panel: #171b2e;
        --line: #2b335c;
        --text: #e9ecff;
        --muted: #9ca8d9;
        --accent: #7cb7ff;
        --money: #ffd45f;
        --sea: #3d9be9;
        --mountain: #8f7a65;
        --city: #d07171;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Inter", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: radial-gradient(circle at top, #1a1f39, var(--bg) 50%);
        color: var(--text);
      }

      .layout {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.25rem;
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(240px, 300px) 1fr minmax(260px, 320px);
      }

      .panel {
        background: color-mix(in srgb, var(--panel) 95%, black 5%);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1rem;
      }

      h1, h2, h3 { margin: 0 0 0.75rem; }
      h1 { font-size: 1.15rem; }
      h2 { font-size: 1rem; color: var(--accent); }
      p { margin: 0.35rem 0; color: var(--muted); font-size: 0.92rem; }

      .legend {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.45rem 0.75rem;
        align-items: center;
      }

      .chip {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1px solid #ffffff44;
      }

      .sea { background: var(--sea); }
      .mountain { background: var(--mountain); }
      .city { background: var(--city); }
      .assam { background: #ffffff; }

      .hud { display: grid; gap: 0.65rem; }

      .stat {
        padding: 0.65rem;
        border-radius: 12px;
        background: #0e1330;
        border: 1px solid #243062;
      }

      .value { display: block; margin-top: 0.2rem; font-weight: 700; }
      .money { color: var(--money); }

      .board-wrap {
        background: linear-gradient(180deg, #192146, #101636);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 1rem;
      }

      .board { display: grid; gap: 0.15rem; justify-content: center; }
      .row { display: flex; gap: 0.15rem; margin-left: var(--offset, 0px); }

      .hex {
        width: 64px;
        height: 72px;
        clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
        background: #222b54;
        border: 1px solid #3f4c88;
        display: grid;
        place-items: center;
        font-size: 0.7rem;
        color: #cdd5ff;
        position: relative;
      }

      .hex .coord {
        position: absolute;
        top: 6px;
        left: 8px;
        font-size: 0.58rem;
        color: #d7defe;
        background: #0a102ba6;
        border-radius: 999px;
        padding: 0.05rem 0.3rem;
      }

      .hex[data-type="sea"] { background: color-mix(in srgb, var(--sea) 50%, #1a2552 50%); }
      .hex[data-type="mountain"] { background: color-mix(in srgb, var(--mountain) 50%, #1a2552 50%); }
      .hex[data-type="city"] { background: color-mix(in srgb, var(--city) 50%, #1a2552 50%); }

      .hex .owner {
        position: absolute;
        inset: auto 5px 5px auto;
        font-size: 0.6rem;
        padding: 0.1rem 0.25rem;
        border-radius: 999px;
        background: #00000066;
      }

      .hex.assam-on {
        outline: 3px solid #fff;
        outline-offset: -3px;
      }

      .assam-marker {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: #f7f9ff;
        color: #121a3c;
        border: 2px solid #ffffff;
        display: grid;
        place-items: center;
        font-size: 1rem;
        font-weight: 700;
        box-shadow: 0 0 0 3px #12205899;
      }

      .assam-dir-indicator {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-bottom: 14px solid #ffe47b;
        transform-origin: 50% 26px;
        filter: drop-shadow(0 1px 2px #000);
      }

      .hex.placeable {
        box-shadow: inset 0 0 0 3px #ffe996;
        cursor: pointer;
      }

      .hex.rotate-selectable {
        box-shadow: inset 0 0 0 3px #9bd0ff;
        cursor: pointer;
      }

      .controls { display: grid; gap: 0.5rem; }

      .btn {
        border: 1px solid #3554a6;
        border-radius: 10px;
        background: linear-gradient(180deg, #294190, #24377a);
        color: white;
        padding: 0.65rem 0.8rem;
        text-align: left;
        font-weight: 600;
      }

      .btn:disabled { opacity: 0.45; }

      .log {
        max-height: 160px;
        overflow: auto;
        border: 1px solid #253062;
        border-radius: 10px;
        padding: 0.5rem;
        background: #0c1129;
      }

      .log li { margin: 0.25rem 0; color: #c4cffc; font-size: 0.84rem; }

      @media (max-width: 1024px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>火星開発ボードゲーム（プレイ可能デモ）</h1>
        <p>
          プレイヤーは火星開発企業。向き変更→アッサム移動→隣接マス配置の
          手番フローを、ブラウザだけで実際に操作できます。
        </p>

        <h2>地形タイプ</h2>
        <div class="legend">
          <span class="chip sea"></span><span>海</span>
          <span class="chip mountain"></span><span>山</span>
          <span class="chip city"></span><span>都市</span>
          <span class="chip assam"></span><span>アッサム（駒）</span>
        </div>

        <h2 style="margin-top: 1rem">ルール（簡易）</h2>
        <p>・着地した地形が他プレイヤー所有なら連結数ぶん支払い</p>
        <p>・支払額 = 連結している同タイプ地形の枚数</p>
        <p>・配置時はアッサム隣接の空きマスのみ選択可能</p>
        <p>・向き変更フェーズは盤面の隣接マスをクリックして向きを決定</p>
      </section>

      <section class="board-wrap">
        <h2>六角形マップ</h2>
        <div id="board" class="board" aria-label="hex board"></div>
      </section>

      <section class="panel">
        <h2>ゲームHUD</h2>
        <div class="hud">
          <div class="stat">現在手番<span id="turnPlayer" class="value">-</span></div>
          <div class="stat">アッサムの向き<span id="direction" class="value">-</span></div>
          <div class="stat">アッサムの位置<span id="position" class="value">-</span></div>
          <div class="stat">フェーズ<span id="phase" class="value">-</span></div>
          <div class="stat">所持金<span id="money" class="value money">-</span></div>
          <div class="stat">配置地形<span id="terrainToPlace" class="value">-</span></div>
        </div>

        <h3 style="margin-top: 1rem">操作</h3>
        <div class="controls">
          <button id="moveBtn" class="btn" type="button">⇢ アッサムを移動</button>
        </div>

        <h3 style="margin-top: 1rem">イベントログ</h3>
        <ul id="log" class="log"></ul>
      </section>
    </main>

    <script>
      const rows = [6, 7, 8, 7, 6];
      const terrainCycle = ["sea", "mountain", "city"];
      const players = ["A", "B", "C"];
      const directions = [
        { name: "東", delta: [1, 0] },
        { name: "北東", delta: [0, -1] },
        { name: "北西", delta: [-1, -1] },
        { name: "西", delta: [-1, 0] },
        { name: "南西", delta: [0, 1] },
        { name: "南東", delta: [1, 1] }
      ];

      const board = [];
      let assam = { x: 3, y: 2, dir: 1 };
      let turn = 0;
      let phase = "rotate";
      let placeTypeIndex = 0;
      let highlighted = [];
      const money = { A: 30, B: 30, C: 30 };

      const boardEl = document.getElementById("board");
      const turnPlayerEl = document.getElementById("turnPlayer");
      const directionEl = document.getElementById("direction");
      const phaseEl = document.getElementById("phase");
      const positionEl = document.getElementById("position");
      const moneyEl = document.getElementById("money");
      const terrainToPlaceEl = document.getElementById("terrainToPlace");
      const logEl = document.getElementById("log");

      const moveBtn = document.getElementById("moveBtn");
      const directionToAngle = [90, 30, -30, -90, -150, 150];

      function currentPlayer() {
        return players[turn % players.length];
      }

      function log(message) {
        const li = document.createElement("li");
        li.textContent = `Turn ${turn + 1}: ${message}`;
        logEl.prepend(li);
      }

      function cellAt(x, y) {
        return board[y] && board[y][x] ? board[y][x] : null;
      }

      function neighbors(x, y) {
        return directions
          .map((d) => cellAt(x + d.delta[0], y + d.delta[1]))
          .filter(Boolean);
      }

      function connectedCount(start) {
        const targetType = start.type;
        const stack = [start];
        const visited = new Set([`${start.x},${start.y}`]);
        while (stack.length) {
          const c = stack.pop();
          for (const n of neighbors(c.x, c.y)) {
            const key = `${n.x},${n.y}`;
            if (!visited.has(key) && n.type === targetType && n.owner === start.owner) {
              visited.add(key);
              stack.push(n);
            }
          }
        }
        return visited.size;
      }

      function renderBoard() {
        boardEl.innerHTML = "";
        rows.forEach((count, y) => {
          const rowEl = document.createElement("div");
          rowEl.className = "row";
          rowEl.style.setProperty("--offset", `${Math.abs(2 - y) * 33}px`);

          for (let x = 0; x < count; x++) {
            const cell = board[y][x];
            const hex = document.createElement("button");
            hex.className = "hex";
            hex.dataset.x = x;
            hex.dataset.y = y;
            hex.dataset.type = cell.type || "";
            hex.type = "button";

            const coord = document.createElement("span");
            coord.className = "coord";
            coord.textContent = `${x},${y}`;
            hex.appendChild(coord);

            if (cell.owner) {
              const owner = document.createElement("span");
              owner.className = "owner";
              owner.textContent = cell.owner;
              hex.appendChild(owner);
            }

            if (x === assam.x && y === assam.y) {
              hex.classList.add("assam-on");
              const marker = document.createElement("span");
              marker.className = "assam-marker";
              marker.textContent = "A";
              hex.appendChild(marker);

              const directionIndicator = document.createElement("span");
              directionIndicator.className = "assam-dir-indicator";
              directionIndicator.style.transform = `rotate(${directionToAngle[assam.dir]}deg) translateY(-21px)`;
              hex.appendChild(directionIndicator);
            }

            const isHighlighted = highlighted.some((h) => h.x === x && h.y === y);
            const directionIndex = directionFromAssam(x, y);
            const isRotateSelectable = phase === "rotate" && directionIndex !== -1;

            if (isHighlighted) {
              hex.classList.add("placeable");
              hex.addEventListener("click", () => placeTerrain(x, y));
            } else if (isRotateSelectable) {
              hex.classList.add("rotate-selectable");
              hex.addEventListener("click", () => setAssamDirection(directionIndex));
            }

            rowEl.appendChild(hex);
          }

          boardEl.appendChild(rowEl);
        });
      }

      function updateHud() {
        turnPlayerEl.textContent = `プレイヤー${currentPlayer()}`;
        directionEl.textContent = directions[assam.dir].name;
        positionEl.textContent = `(${assam.x}, ${assam.y})`;
        phaseEl.textContent = {
          rotate: "向き変更",
          move: "移動",
          place: "配置",
          end: "手番終了"
        }[phase];
        terrainToPlaceEl.textContent = terrainCycle[placeTypeIndex];
        moneyEl.textContent = `A: ${money.A} / B: ${money.B} / C: ${money.C}`;

        moveBtn.disabled = phase !== "move";
      }

      function directionFromAssam(x, y) {
        const dx = x - assam.x;
        const dy = y - assam.y;
        return directions.findIndex((d) => d.delta[0] === dx && d.delta[1] === dy);
      }

      function setAssamDirection(directionIndex) {
        if (phase !== "rotate") return;
        assam.dir = directionIndex;
        phase = "move";
        log(`${currentPlayer()}がアッサムの向きを${directions[assam.dir].name}へ変更`);
        refresh();
      }

      function moveAssam() {
        if (phase !== "move") return;
        const d = directions[assam.dir].delta;
        let next = cellAt(assam.x + d[0], assam.y + d[1]);
        if (!next) {
          assam.dir = (assam.dir + 3) % directions.length;
          const reversed = directions[assam.dir].delta;
          next = cellAt(assam.x + reversed[0], assam.y + reversed[1]);
        }
        if (!next) return;

        assam.x = next.x;
        assam.y = next.y;
        log(`${currentPlayer()}のアッサムが(${next.x},${next.y})に移動`);

        if (next.type && next.owner && next.owner !== currentPlayer()) {
          const pay = connectedCount(next);
          money[currentPlayer()] -= pay;
          money[next.owner] += pay;
          log(`${next.type}の連結${pay} → ${currentPlayer()}が${next.owner}へ${pay}支払い`);
        }

        phase = "place";
        startPlace();
      }

      function startPlace() {
        if (phase !== "place") return;
        highlighted = neighbors(assam.x, assam.y).filter((c) => !c.type);
        if (!highlighted.length) {
          log("隣接に空きマスがないため配置をスキップ");
          advanceTurn();
          return;
        }
        refresh();
      }

      function placeTerrain(x, y) {
        if (phase !== "place") return;
        const cell = cellAt(x, y);
        if (!cell || cell.type) return;

        cell.type = terrainCycle[placeTypeIndex];
        cell.owner = currentPlayer();
        log(`${currentPlayer()}が(${x},${y})へ${cell.type}を配置`);

        placeTypeIndex = (placeTypeIndex + 1) % terrainCycle.length;
        highlighted = [];
        advanceTurn();
      }

      function advanceTurn() {
        turn += 1;
        phase = "rotate";
        log(`次の手番はプレイヤー${currentPlayer()}`);
        refresh();
      }

      function refresh() {
        renderBoard();
        updateHud();
      }

      function initBoard() {
        rows.forEach((count, y) => {
          const row = [];
          for (let x = 0; x < count; x++) {
            row.push({ x, y, type: null, owner: null });
          }
          board.push(row);
        });

        const seed = [
          { x: 1, y: 1, type: "sea", owner: "B" },
          { x: 2, y: 1, type: "sea", owner: "B" },
          { x: 4, y: 2, type: "mountain", owner: "C" },
          { x: 3, y: 3, type: "city", owner: "A" }
        ];
        seed.forEach((s) => {
          const c = cellAt(s.x, s.y);
          if (c) {
            c.type = s.type;
            c.owner = s.owner;
          }
        });

        moveBtn.addEventListener("click", moveAssam);

        log("ゲーム開始。プレイヤーAから開始");
        refresh();
      }

      initBoard();
    </script>
  </body>
</html>
